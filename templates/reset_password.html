{% extends "base.html" %}
{% block title %}Reset Password – goodgurl.gg{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card glass-card p-4">
            <h2 class="text-center brand-gradient mb-4"><i class="bi bi-key"></i> Reset Password</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="password" class="form-control" required minlength="8">
                    <small class="text-muted">Min 8 chars, upper + lower + digit</small>
                </div>
                <button type="submit" class="btn btn-pink w-100 btn-lg">Reset Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
