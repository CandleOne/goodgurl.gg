{% extends "base.html" %}
{% block title %}Forgot Password – goodgurl.gg{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card glass-card p-4">
            <h2 class="text-center brand-gradient mb-4"><i class="bi bi-envelope"></i> Forgot Password</h2>
            <p class="text-muted text-center small">Enter your email address and we'll generate a password reset link.</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required autofocus>
                </div>
                <button type="submit" class="btn btn-pink w-100 btn-lg">Send Reset Link</button>
            </form>
            <p class="text-center mt-3 mb-0">
                <a href="{{ url_for('login') }}">Back to login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
